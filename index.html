<body>
<div class="container">
  <header>

  <div class="stats-grid">

    <button class="btn btn-primary" onclick="openModal()">+ 添加创作者</button>

  <div class="tabs">
    <div class="tab active" onclick="setView('all')">全部</div>

</div>

<div class="modal-overlay" id="modal">

        <div class="form-group"><label>体量</label><select id="mTier"><option value="头部">头部</option><option value="中腰部">中腰部</option><option value="尾部">尾部</option></select></div>

      <div class="form-row">

        <div class="form-group"><label>内容定位</label><input type="text" id="mPosition" placeholder="例如：AI纪录片创作者"></div>
      </div>
      <div class="form-group">
        <label>作品链接（每行一个，格式：作品名|链接 或仅链接）</label>

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveCreator()">保存</button>
    </div>
  </div>
</div>

  { id:55, name:"国翠儿", account:"国翠儿", platform:"小红书", category:"人文纪实类", fans:"53.3万", fansNum:533000, tier:"中腰部", position:"中国传统文化纪实科普", links:[{name:"60秒了解北京中轴线",url:"https://www.xiaohongshu.com/search_result?keyword=国翠儿"}], notes:"结合技术流讲解中国传统文化，抖音精选推荐", status:"追踪中", createdAt:"2026-04-22" },
  { id:56, name:"山白", account:"山白", platform:"小红书", category:"人文纪实类", fans:"146.9万", fansNum:1469000, tier:"中腰部", position:"传统文化+生活纪实", links:[], notes:"00后创作者，2024小红书涨粉TOP500。传统文化元素融入纪实内容", status:"追踪中", createdAt:"2026-04-22" },
  { id:57, name:"南翔不爱吃饭", account:"南翔不爱吃饭", platform:"小红书", category:"人文纪实类", fans:"404.6万", fansNum:4046000, tier:"中腰部", position:"传统文化纪实", links:[], notes:"2024涨粉表现突出，以传统文化元素获得用户偏爱", status:"追踪中", createdAt:"2026-04-22" },
  { id:58, name:"星球研究所", account:"星球研究所", platform:"小红书", category:"人文纪实类", fans:"117.7万", fansNum:1177000, tier:"中腰部", position:"自然地理+人文纪实", links:[{name:"地理科普",url:"https://www.xiaohongshu.com/search_result?keyword=星球研究所"}], notes:"中国地理科普顶流，纪实影像+深度图文。全网知名度极高", status:"追踪中", createdAt:"2026-04-22" },
];

let nextId = creators.length + 1;
let currentView = 'all';

function parseFans(fansStr) {
  if (!fansStr) return 0;
  const s = fansStr.toString().replace(/,/g, '').replace(/\+/g, '');
  let num = parseFloat(s);
  if (s.includes('万')) num *= 10000;
  if (s.includes('亿')) num *= 100000000;
  return num || 0;
}

function tierClass(tier) {
  return tier === '头部' ? 'tier-head' : tier === '中腰部' ? 'tier-mid' : 'tier-tail';
}
function platClass(plat) {
  return plat === '抖音' ? 'plat-douyin' : plat === 'B站' ? 'plat-bilibili' : 'plat-xiaohongshu';
}
function catClass(cat) {
  return cat === 'AI人文类' ? 'tag-ai-human' : cat === 'AI纪实类' ? 'tag-ai-doc' : 'tag-human-doc';
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const plat = document.getElementById('platformFilter').value;
  const cat = document.getElementById('categoryFilter').value;
  const tier = document.getElementById('tierFilter').value;
  const status = document.getElementById('statusFilter').value;

  let filtered = creators.filter(c => {
    if (search && !(
      c.name.toLowerCase().includes(search) ||
      (c.account && c.account.toLowerCase().includes(search)) ||
      (c.position && c.position.toLowerCase().includes(search)) ||
      (c.notes && c.notes.toLowerCase().includes(search)) ||
      c.links.some(l => (l.name || '').toLowerCase().includes(search))
    )) return false;
    if (plat && c.platform !== plat) return false;
    if (cat && c.category !== cat) return false;
    if (tier && c.tier !== tier) return false;
    if (status && c.status !== status) return false;
    if (currentView === 'douyin' && c.platform !== '抖音') return false;
    if (currentView === 'bilibili' && c.platform !== 'B站') return false;
    if (currentView === 'xiaohongshu' && c.platform !== '小红书') return false;
    if (currentView === 'ai-human' && c.category !== 'AI人文类') return false;
    if (currentView === 'ai-doc' && c.category !== 'AI纪实类') return false;
    if (currentView === 'human-doc' && c.category !== '人文纪实类') return false;
    if (currentView === 'head' && c.tier !== '头部') return false;
    if (currentView === 'mid' && c.tier !== '中腰部') return false;
    return true;
  });

  const tbody = document.getElementById('creatorTable');
  const empty = document.getElementById('emptyState');
  tbody.innerHTML = '';

  if (filtered.length === 0) {
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    filtered.forEach(c => {
      const tr = document.createElement('tr');
      const linksHtml = c.links && c.links.length
        ? `<div class="link-list">${c.links.map(l => `<a href="${l.url}" target="_blank">${l.name || l.url}</a>`).join('')}</div>`
        : '<span style="color:#9ca3af;font-size:12px;">—</span>';
      tr.innerHTML = `
        <td><strong>${c.name}</strong><br><span style="font-size:11px;color:#6b7280;">@${c.account || '—'}</span></td>
        <td><span class="platform-tag ${platClass(c.platform)}">${c.platform}</span></td>
        <td><span class="tag ${catClass(c.category)}">${c.category}</span></td>
        <td class="fans-badge">${c.fans}</td>
        <td><span class="tier-tag ${tierClass(c.tier)}">${c.tier}</span></td>
        <td style="font-size:12px;color:#374151;">${c.position || '—'}</td>
        <td>${linksHtml}</td>
        <td class="note-cell">${c.notes || '—'}</td>
        <td style="font-size:12px;">${c.status}</td>
        <td>
          <div class="actions">
            <button class="btn btn-sm btn-secondary" onclick="editCreator(${c.id})">编辑</button>
            <button class="btn btn-sm btn-danger" onclick="deleteCreator(${c.id})">删除</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }
  updateStats();
}

function updateStats() {
  const total = creators.length;
  const douyin = creators.filter(c => c.platform === '抖音').length;
  const bilibili = creators.filter(c => c.platform === 'B站').length;
  const xiaohongshu = creators.filter(c => c.platform === '小红书').length;
  const aiHuman = creators.filter(c => c.category === 'AI人文类').length;
  const aiDoc = creators.filter(c => c.category === 'AI纪实类').length;
  const humanDoc = creators.filter(c => c.category === '人文纪实类').length;
  const head = creators.filter(c => c.tier === '头部').length;
  const mid = creators.filter(c => c.tier === '中腰部').length;
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-douyin').textContent = douyin;
  document.getElementById('st-bilibili').textContent = bilibili;
  document.getElementById('st-xiaohongshu').textContent = xiaohongshu;
  document.getElementById('st-ai-human').textContent = aiHuman;
  document.getElementById('st-ai-doc').textContent = aiDoc;
  document.getElementById('st-human-doc').textContent = humanDoc;
  document.getElementById('st-head').textContent = head;
  document.getElementById('st-mid').textContent = mid;
}

function setView(view) {
  currentView = view;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderTable();
}

function openModal() {
  document.getElementById('modalTitle').textContent = '添加创作者';
  document.getElementById('editId').value = '';
  ['mName','mAccount','mFans','mPosition','mLinks','mNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('mPlatform').value = '抖音';
  document.getElementById('mCategory').value = 'AI人文类';
  document.getElementById('mTier').value = '中腰部';
  document.getElementById('mStatus').value = '追踪中';
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }

function editCreator(id) {
  const c = creators.find(x => x.id === id);
  if (!c) return;
  document.getElementById('modalTitle').textContent = '编辑创作者';
  document.getElementById('editId').value = c.id;
  document.getElementById('mName').value = c.name;
  document.getElementById('mAccount').value = c.account || '';
  document.getElementById('mPlatform').value = c.platform;
  document.getElementById('mCategory').value = c.category;
  document.getElementById('mFans').value = c.fans;
  document.getElementById('mTier').value = c.tier;
  document.getElementById('mStatus').value = c.status;
  document.getElementById('mPosition').value = c.position || '';
  document.getElementById('mLinks').value = c.links.map(l => l.name ? `${l.name}|${l.url}` : l.url).join('\n');
  document.getElementById('mNotes').value = c.notes || '';
  document.getElementById('modal').classList.add('active');
}

function saveCreator() {
  const idVal = document.getElementById('editId').value;
  const name = document.getElementById('mName').value.trim();
  const fansStr = document.getElementById('mFans').value.trim();
  if (!name || !fansStr) { alert('请填写创作者名称和粉丝量'); return; }

  const linksRaw = document.getElementById('mLinks').value.trim().split('\n').filter(Boolean);
  const links = linksRaw.map(line => {
    if (line.includes('|')) { const [n,u] = line.split('|',2); return {name:n.trim(), url:u.trim()}; }
    return {name:line.trim().substring(0,30)+(line.length>30?'...':''), url:line.trim()};
  });

  const data = {
    id: idVal ? parseInt(idVal) : nextId++,
    name, account: document.getElementById('mAccount').value.trim(),
    platform: document.getElementById('mPlatform').value,
    category: document.getElementById('mCategory').value,
    fans: fansStr, fansNum: parseFans(fansStr),
    tier: document.getElementById('mTier').value,
    status: document.getElementById('mStatus').value,
    position: document.getElementById('mPosition').value.trim(),
    links, notes: document.getElementById('mNotes').value.trim(),
    createdAt: idVal ? (creators.find(c=>c.id===parseInt(idVal))?.createdAt||'2026-04-22') : new Date().toISOString().split('T')[0]
  };

  if (idVal) { const idx = creators.findIndex(c=>c.id===parseInt(idVal)); if(idx!==-1) creators[idx]=data; }
  else creators.push(data);
  closeModal(); renderTable();
}

function deleteCreator(id) {
  if (!confirm('确定删除？')) return;
  creators = creators.filter(c => c.id !== id);
  renderTable();
}

function exportData() {
  const blob = new Blob([JSON.stringify(creators, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `创作者追踪_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try { const data=JSON.parse(ev.target.result); if(Array.isArray(data)){ creators=data; nextId=creators.reduce((m,c)=>Math.max(m,c.id||0),0)+1; renderTable(); alert('导入成功'); }
      else alert('格式错误'); } catch(err){ alert('解析失败:'+err.message); }
    }; reader.readAsText(file);
  }; input.click();
}

['searchInput','platformFilter','categoryFilter','tierFilter','statusFilter'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderTable);
});
renderTable();

function exportExcel() {
  const data = creators.map(c => ({
    "创作者": c.name,
    "平台账号": c.account,
    "渠道": c.platform,
    "品类": c.category,
    "粉丝量": c.fans,
    "体量": c.tier,
    "内容定位": c.position,
    "状态": c.status,
    "作品链接": c.links.map(l => l.name + ": " + l.url).join("; "),
    "备注": c.notes
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "创作者清单");
  XLSX.writeFile(wb, `创作者追踪_${new Date().toISOString().split('T')[0]}.xlsx`);
}
</script>
